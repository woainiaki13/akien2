{% extends "base.html" %}

{% block title %}访问受限 - {{ restaurant.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">⛔ 访问受限</h4>
                </div>
                
                <div class="card-body py-5">
                    <div class="display-1 mb-4">🚫</div>
                    <h3 class="text-danger mb-3">无法进入该餐厅</h3>
                    <p class="text-muted mb-4">
                        你已被「{{ restaurant.name }}」拉入黑名单，无法点餐。
                    </p>
                    <p class="small text-muted mb-4">
                        如有疑问，请联系餐厅管理员。
                    </p>
                    
                    <hr>
                    
                    <a href="{{ url_for('order.home') }}" class="btn btn-primary">
                        浏览其他餐厅
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
