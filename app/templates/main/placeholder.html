{% extends "base.html" %}

{% block title %}{{ title }} - 餐厅订餐系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow text-center">
            <div class="card-body py-5">
                <!-- 占位图标 -->
                <div class="display-1 mb-4">🚧</div>
                
                <!-- 标题 -->
                <h2 class="card-title mb-3">{{ title }}</h2>
                
                <!-- 提示信息 -->
                <p class="card-text text-muted lead">{{ message }}</p>
                
                <!-- 返回按钮 -->
                <div class="mt-4">
                    <a href="{{ url_for('main.choice') }}" class="btn btn-outline-primary">
                        ← 返回选择页面
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
