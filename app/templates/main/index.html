{% extends "base.html" %}

{% block title %}欢迎 - 餐厅订餐系统{% endblock %}

{% block content %}
<div class="row justify-content-center text-center py-5">
    <div class="col-md-8 col-lg-6">
        <!-- 欢迎标题 -->
        <div class="mb-4">
            <h1 class="display-4 fw-bold text-primary">🍽️ 餐厅订餐系统</h1>
            <p class="lead text-muted">便捷的餐厅管理与在线订餐平台</p>
        </div>
        
        <!-- 功能介绍 -->
        <div class="row g-4 mb-5">
            <div class="col-6">
                <div class="card h-100 border-0 bg-light">
                    <div class="card-body">
                        <div class="display-6 mb-2">🏪</div>
                        <h5>餐厅管理</h5>
                        <p class="small text-muted">轻松管理您的餐厅信息、菜单和订单</p>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="card h-100 border-0 bg-light">
                    <div class="card-body">
                        <div class="display-6 mb-2">🛒</div>
                        <h5>在线订餐</h5>
                        <p class="small text-muted">浏览菜单、下单订餐、便捷支付</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="d-grid gap-3 d-md-flex justify-content-md-center">
            <a href="{{ url_for('auth.login') }}" class="btn btn-success btn-lg px-4">
                登录账号
            </a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg px-4">
                注册新用户
            </a>
        </div>
    </div>
</div>
{% endblock %}
